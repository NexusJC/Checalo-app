name: checalo_app
description: "App móvil para escanear códigos de barras y consultar precios en tiempo real según la tienda donde estás. Independiente de cualquier cadena comercial."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.0.0
  http: ^1.2.0
  connectivity_plus: ^6.0.0
  geolocator: ^13.0.0
  #google_maps_flutter: ^2.6.0
  provider: ^6.1.2
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icono.png"
  adaptive_icon_background: "#FF6B2B"
  adaptive_icon_foreground: "assets/icono.png"

flutter:
  uses-material-design: true
  assets:
    - assets/